services:
  web:
    build: .
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:?Set DJANGO_DEBUG in .env}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:?Set DJANGO_CSRF_TRUSTED_ORIGINS in .env}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:?Set LOGIN_RATE_LIMIT_ATTEMPTS in .env}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:?Set LOGIN_RATE_LIMIT_WINDOW_SECONDS in .env}
      DOCUMENTS_MAX_UPLOAD_SIZE_BYTES: ${DOCUMENTS_MAX_UPLOAD_SIZE_BYTES:-52428800}
      DOCUMENTS_MAX_FILES_PER_USER: ${DOCUMENTS_MAX_FILES_PER_USER:-1000}
      DOCUMENTS_ALLOWED_UPLOAD_EXTENSIONS: ${DOCUMENTS_ALLOWED_UPLOAD_EXTENSIONS:-pdf,jpg,jpeg,png,webp,gif,doc,docx,xls,xlsx,csv,txt,rtf,odt,ods,ppt,pptx}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-mailhog}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Dcode Management <noreply@localhost>}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"

volumes:
  postgres_data:
