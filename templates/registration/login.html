{% extends "base.html" %}
{% block title %}Logowanie - Dcode Management{% endblock %}
{% block heading %}Logowanie{% endblock %}
{% block eyebrow %}Dostęp do systemu{% endblock %}
{% block content %}
<section class="auth-panel">
  <form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary-btn full">Zaloguj</button>
    <a class="text-link" href="{% url 'accounts:register' %}">Utwórz konto</a>
  </form>
</section>
{% endblock %}
