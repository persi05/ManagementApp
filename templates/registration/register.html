{% extends "base.html" %}
{% block title %}Rejestracja - Dcode Management{% endblock %}
{% block heading %}Nowe konto{% endblock %}
{% block eyebrow %}Konto klienta{% endblock %}
{% block content %}
<section class="auth-panel">
  <form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary-btn full">Zarejestruj</button>
    <a class="text-link" href="{% url 'accounts:login' %}">Mam już konto</a>
  </form>
</section>
{% endblock %}
